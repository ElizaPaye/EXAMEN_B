<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nuevo Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f8f9fa;">

<div class="container mt-5">

    <h2 class="mb-4">Nuevo Registro</h2>

    <div class="card shadow p-4">

        <form method="POST">

            <div class="mb-3">
                <input name="mascota" class="form-control" placeholder="Mascota">
            </div>

            <div class="mb-3">
                <input name="propietario" class="form-control" placeholder="Propietario">
            </div>

            <div class="mb-3">
                <input name="especie" class="form-control" placeholder="Especie">
            </div>

            <div class="mb-3">
                <input name="fecha" type="date" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">
                Guardar
            </button>

            <a href="/" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>

</div>

</body>
</html>
